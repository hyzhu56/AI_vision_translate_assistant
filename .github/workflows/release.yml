name: Build & Release

on:
  push:
    tags:
      - "v*"

# Write permission is required to create/update GitHub Releases.
permissions:
  contents: write

env:
  # Force all Node-20-targeting actions to run on Node.js 24 to suppress deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Allow individual platform builds to fail without blocking the release job.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Windows
            arch: x64
            runner: windows-latest
            artifact: AI-Vision-Assistant-Windows-x64.exe

          - os: Windows
            arch: arm64
            runner: windows-11-arm
            artifact: AI-Vision-Assistant-Windows-arm64.exe

          # macos-13 (Intel) is no longer available on GitHub-hosted runners.
          # The Apple Silicon binary runs on Intel Macs via Rosetta 2.
          - os: macOS
            arch: AppleSilicon
            runner: macos-latest
            artifact: AI-Vision-Assistant-macOS

          - os: Linux
            arch: x64
            runner: ubuntu-latest
            artifact: AI-Vision-Assistant-Linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux: Qt system libs required by PyQt6
      - name: Install Qt system deps (Linux only)
        if: matrix.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libgl1 \
            libglib2.0-0 \
            libegl1 \
            libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Windows: embed app_icon.ico into the .exe and bundle it as a data file
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "AI-Vision-Assistant" `
            --icon "app_icon.ico" `
            --add-data "app_icon.ico;." `
            main.py

      # macOS / Linux: bundle icon as data file (macOS also sets dock icon via .ico)
      - name: Build with PyInstaller (macOS / Linux)
        if: matrix.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "AI-Vision-Assistant" \
            --add-data "app_icon.ico:." \
            main.py

      - name: Rename artifact (Windows)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          Move-Item dist\AI-Vision-Assistant.exe dist\${{ matrix.artifact }}

      - name: Rename artifact (macOS / Linux)
        if: matrix.os != 'Windows'
        run: mv dist/AI-Vision-Assistant dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    # Run even when some matrix builds fail; skip only if the entire build job
    # was never started (e.g. tag filter didn't match).
    if: always() && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          # Merge all platform artifacts into the same flat directory
          merge-multiple: true

      - name: List downloaded artifacts
        run: find dist -type f | sort

      - name: Generate release notes and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Build changelog from git log
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..${TAG}" --pretty="- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log "${TAG}" --pretty="- %s (%h)" --no-merges | head -20)
          fi

          # Write release body to file (avoids shell quoting issues)
          {
            echo "## AI Vision Translate Assistant ${TAG}"
            echo ""
            echo "Windows desktop floating assistant — capture any screen region with \`Ctrl+CapsLock\` and get AI-powered translation or code analysis instantly."
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Windows x64 | \`AI-Vision-Assistant-Windows-x64.exe\` |"
            echo "| Windows ARM64 | \`AI-Vision-Assistant-Windows-arm64.exe\` |"
            echo "| macOS (Apple Silicon · Rosetta 2 compatible) | \`AI-Vision-Assistant-macOS\` |"
            echo "| Linux x64 | \`AI-Vision-Assistant-Linux-x64\` |"
            echo ""
            echo "### Quick Setup"
            echo ""
            echo "1. Download the binary for your platform"
            echo "2. Run the binary — on first launch the Settings window opens automatically"
            echo "3. Enter your API Key and save — the tray icon will appear"
            echo ""
            echo "> **Optional**: place a \`.env\` file next to the binary for pre-configuration:"
            echo "> \`\`\`"
            echo "> KIMI_API_KEY=sk-your-key-here"
            echo "> KIMI_API_BASE=https://api.moonshot.cn/v1"
            echo "> KIMI_MODEL=kimi-k2.5"
            echo "> \`\`\`"
            echo ""
            echo "### Changes"
            echo ""
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo "Full documentation: https://github.com/${GITHUB_REPOSITORY}/blob/main/README.md"
          } > /tmp/release-notes.md

          # Determine prerelease flag (tags containing '-' are pre-releases)
          PRERELEASE_FLAG=""
          if [[ "${TAG}" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Delete any existing release for this tag to allow clean re-runs.
          gh release delete "${TAG}" --yes 2>/dev/null || true

          # Collect artifact files with find (avoids globstar issues in bash)
          mapfile -t ARTIFACTS < <(find dist -maxdepth 1 -type f | sort)

          if [ ${#ARTIFACTS[@]} -eq 0 ]; then
            echo "ERROR: No artifacts found in dist/" >&2
            exit 1
          fi

          echo "Attaching ${#ARTIFACTS[@]} artifact(s): ${ARTIFACTS[*]}"

          gh release create "${TAG}" \
            --title "AI Vision Translate Assistant ${TAG}" \
            --notes-file /tmp/release-notes.md \
            ${PRERELEASE_FLAG} \
            "${ARTIFACTS[@]}"
